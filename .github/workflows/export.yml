name: Export Game
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: 2048-godot
  PROJECT_PATH: .

jobs:
  test-and-export:
    name: Test & Export Android
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          # Copy templates and editor config from /root/
          if [ -d /root/.config/godot ]; then
            mv /root/.config/godot ~/.config/godot
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ~/.local/share/godot/export_templates/
          fi
          # Verify
          ls ~/.config/godot/editor_settings-* 2>/dev/null || echo "No editor settings found"
          ls ~/.local/share/godot/export_templates/ 2>/dev/null || echo "No templates found"

      - name: Run Tests
        run: |
          godot --headless -s test/run_tests.gd || echo "Tests failed but continuing to export"

      - name: Android Build
        run: |
          mkdir -v -p build/android
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          # Try multiple approaches
          echo "=== Attempt 1: --headless ==="
          godot --headless --export-release "Android" "$EXPORT_DIR/android/$EXPORT_NAME.apk" 2>&1 || true
          
          echo ""
          echo "=== Attempt 2: Initialize editor first then export ==="
          mkdir -p /tmp/fake_home
          HOME=/tmp/fake_home godot --headless --export-release "Android" "$EXPORT_DIR/android/$EXPORT_NAME.apk" 2>&1 || true

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android
