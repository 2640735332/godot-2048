name: Export Game
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: 2048-godot
  GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /root/debug.keystore
  GODOT_ANDROID_KEYSTORE_RELEASE_USER: androiddebugkey
  GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: android

jobs:
  export-android:
    name: Test & Export Android
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          echo "HOME=$HOME"
          # Mark repo as safe for git (needed for git commands in container)
          git config --global --add safe.directory /__w/godot-2048/godot-2048
          # Auto-version: use git commit count as version code
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "Version code: $VERSION_CODE"
          # Update export_presets.cfg with version code
          sed -i "s/version\/code=[0-9]*/version\/code=$VERSION_CODE/" export_presets.cfg
          # Copy config and templates to actual HOME (/github/home)
          mkdir -v -p $HOME/.config/godot
          mkdir -v -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cp -rv /root/.config/godot/* $HOME/.config/godot/
          cp -rv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          # Generate debug keystore for APK signing
          mkdir -v -p $HOME/.local/share/godot/keystores
          keytool -genkey -v -keystore $HOME/.local/share/godot/keystores/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          # Update editor settings keystore path and add release keystore config
          sed -i "s|export/android/debug_keystore = \"/root/debug.keystore\"|export/android/debug_keystore = \"$HOME/.local/share/godot/keystores/debug.keystore\"|" $HOME/.config/godot/editor_settings-4.3.tres
          # Verify
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android*
          echo "Keystore:"
          ls -la $HOME/.local/share/godot/keystores/debug.keystore

      - name: Run Tests
        run: |
          godot --headless -s test/run_tests.gd

      - name: Android Build
        run: |
          mkdir -v -p build/android
          EXPORT_DIR="$(readlink -f build)"
          godot --headless --verbose --export-release "Android" "$EXPORT_DIR/android/$EXPORT_NAME.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android

  export-web:
    name: Export Web
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          # Copy web export templates
          mkdir -v -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cp -rv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/web* $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          godot --headless --export-release "Web" "$EXPORT_DIR/web/index.html"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: build/web

      - name: Deploy to Server
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          # Install rsync (not in container by default)
          apt-get update -qq && apt-get install -y -qq rsync 2>/dev/null || which rsync || echo "rsync N/A, fallback to scp"
          rsync -avz --delete build/web/ "ubuntu@$DEPLOY_HOST:website/games/2048/" 2>/dev/null || \
          scp -r build/web/* "ubuntu@$DEPLOY_HOST:website/games/2048/"
          echo "✅ Deployed to $DEPLOY_HOST"
