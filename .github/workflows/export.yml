name: Export Game
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          godot --headless -s test/run_tests.gd

  export:
    name: Export All
    needs: test
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xvfb
        run: |
          apt-get update -qq && apt-get install -y -qq xvfb

      - name: Export Web
        run: |
          mkdir -p build/web
          xvfb-run -a godot --editor --headless --export-release "Web" build/web/index.html --quit

      - name: Export Android
        run: |
          mkdir -p build/android
          xvfb-run -a godot --editor --headless --export-release "Android" build/android/2048-godot.apk --quit

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            build/web
            build/android
