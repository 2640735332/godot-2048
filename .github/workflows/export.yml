name: Export Game
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-export:
    name: Test & Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          godot --headless -s test/run_tests.gd

      - name: Export Web
        run: |
          mkdir -p build/web
          xvfb-run -a godot --editor --export-release "Web" build/web/index.html --quit

      - name: Export Android
        run: |
          mkdir -p build/android
          xvfb-run -a godot --editor --export-release "Android" build/android/2048-godot.apk --quit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            build/web
            build/android
